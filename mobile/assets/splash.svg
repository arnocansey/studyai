<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1284 2778" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030303"/>
      <stop offset="50%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#030303"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1284" height="2778" fill="url(#bgGrad)"/>

  <!-- Ambient glow orbs -->
  <circle cx="642" cy="900" r="400" fill="url(#orbGlow)"/>
  <circle cx="300" cy="1400" r="300" fill="url(#orbGlow)" opacity="0.5"/>
  <circle cx="984" cy="1600" r="250" fill="url(#orbGlow)" opacity="0.3"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.03" stroke="#7C3AED" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="2778"/>
    <line x1="128" y1="0" x2="128" y2="2778"/>
    <line x1="256" y1="0" x2="256" y2="2778"/>
    <line x1="384" y1="0" x2="384" y2="2778"/>
    <line x1="512" y1="0" x2="512" y2="2778"/>
    <line x1="642" y1="0" x2="642" y2="2778"/>
    <line x1="770" y1="0" x2="770" y2="2778"/>
    <line x1="898" y1="0" x2="898" y2="2778"/>
    <line x1="1026" y1="0" x2="1026" y2="2778"/>
    <line x1="1154" y1="0" x2="1154" y2="2778"/>
    <line x1="1284" y1="0" x2="1284" y2="2778"/>
    <line x1="0" y1="0" x2="1284" y2="0"/>
    <line x1="0" y1="278" x2="1284" y2="278"/>
    <line x1="0" y1="556" x2="1284" y2="556"/>
    <line x1="0" y1="834" x2="1284" y2="834"/>
    <line x1="0" y1="1112" x2="1284" y2="1112"/>
    <line x1="0" y1="1389" x2="1284" y2="1389"/>
    <line x1="0" y1="1667" x2="1284" y2="1667"/>
    <line x1="0" y1="1945" x2="1284" y2="1945"/>
    <line x1="0" y1="2223" x2="1284" y2="2223"/>
    <line x1="0" y1="2500" x2="1284" y2="2500"/>
    <line x1="0" y1="2778" x2="1284" y2="2778"/>
  </g>

  <!-- Logo icon (centered) -->
  <g transform="translate(522, 1100) scale(5.5)">
    <!-- Cap brim -->
    <path d="M24 12 L44 24 L24 36 L4 24 Z" fill="url(#logoGrad)" opacity="0.9"/>
    <!-- Cap top -->
    <rect x="18" y="6" width="12" height="10" rx="2" fill="url(#logoGrad)"/>
    <!-- Tassel -->
    <line x1="24" y1="10" x2="38" y2="4" stroke="url(#glowGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="38" cy="4" r="3" fill="#A78BFA"/>
    <!-- Neural nodes -->
    <circle cx="12" cy="24" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="24" cy="24" r="3" fill="white"/>
    <circle cx="36" cy="24" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="18" cy="16" r="2" fill="white" opacity="0.7"/>
    <circle cx="30" cy="16" r="2" fill="white" opacity="0.7"/>
    <!-- Neural connections -->
    <line x1="12" y1="24" x2="24" y2="24" stroke="white" stroke-width="1.2" opacity="0.5"/>
    <line x1="24" y1="24" x2="36" y2="24" stroke="white" stroke-width="1.2" opacity="0.5"/>
    <line x1="18" y1="16" x2="12" y2="24" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="18" y1="16" x2="24" y2="24" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="16" x2="24" y2="24" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="16" x2="36" y2="24" stroke="white" stroke-width="1" opacity="0.4"/>
    <!-- AI sparkle -->
    <path d="M38 32 L40 28 L42 32 L46 34 L42 36 L40 40 L38 36 L34 34 Z" fill="url(#glowGrad)" opacity="0.85"/>
  </g>

  <!-- Wordmark -->
  <text x="642" y="1480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="96" font-weight="700" letter-spacing="-2" text-anchor="middle">
    <tspan fill="#EDEDED">Study</tspan><tspan fill="#7C3AED">AI</tspan>
  </text>

  <!-- Tagline -->
  <text x="642" y="1540" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="400" text-anchor="middle" fill="#6B7280" letter-spacing="3">
    INTERACTIVE TECH EDUCATION
  </text>
</svg>
