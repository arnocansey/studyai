services:
  - type: web
    name: studyai-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install --legacy-peer-deps && npx prisma generate && npx nest build
    startCommand: cd backend && node dist/src/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_2anZNrvm7WRs@ep-small-smoke-attwr3r0-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require"
      - key: DIRECT_URL
        value: "postgresql://neondb_owner:npg_2anZNrvm7WRs@ep-small-smoke-attwr3r0.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require"
      - key: JWT_SECRET
        value: "studyai-dev-jwt-secret-change-in-production-2026"
      - key: JWT_EXPIRATION
        value: 7d
      - key: CORS_ORIGINS
        value: "https://studyai-fawn.vercel.app,http://localhost:3000"
      - key: PORT
        value: 4000
      - key: GEMINI_API_KEY
        value: ""
      - key: THROTTLE_TTL
        value: 60
      - key: THROTTLE_LIMIT
        value: 60
