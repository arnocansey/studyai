services:
  - type: web
    name: studyai-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install --legacy-peer-deps --include=dev && npx prisma@6.19.3 db push && npx prisma@6.19.3 generate && npx nest build
    startCommand: cd backend && node dist/src/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 7d
      - key: CORS_ORIGINS
        value: "https://studyai-fawn.vercel.app,http://localhost:3000"
      - key: PORT
        value: 4000
      - key: GEMINI_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: THROTTLE_TTL
        value: 60
      - key: THROTTLE_LIMIT
        value: 60
