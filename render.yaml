services:
  - type: web
    name: studyai-backend
    runtime: node
    region: oregon
    plan: free
    # Migrate on build AND start so schema stays current even if build cache skips migrate.
    buildCommand: cd backend && npm install --legacy-peer-deps --include=dev && npx prisma@6.19.3 migrate deploy && npx prisma@6.19.3 generate && npx nest build
    startCommand: cd backend && npx prisma@6.19.3 migrate deploy && node dist/src/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_DAYS
        value: "30"
      - key: FRONTEND_URL
        value: "https://studyai-fawn.vercel.app"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: CORS_ORIGINS
        value: "https://studyai-fawn.vercel.app,http://localhost:3000"
      - key: PORT
        value: 4000
      - key: GEMINI_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: THROTTLE_TTL
        value: 60
      - key: THROTTLE_LIMIT
        value: 60
      # Leave Redis off until you attach a Render Redis instance and set REDIS_URL.
      # REDIS_ENABLED=true alone without REDIS_URL will not attempt localhost.
      - key: REDIS_ENABLED
        value: "false"
      - key: REDIS_URL
        sync: false
