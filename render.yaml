services:
  - type: web
    name: studyai-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install --legacy-peer-deps --include=dev && npx prisma@6.19.3 migrate deploy && npx prisma@6.19.3 generate && npx nest build
    startCommand: cd backend && node dist/src/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_DAYS
        value: "30"
      - key: FRONTEND_URL
        value: "https://studyai-fawn.vercel.app"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: CORS_ORIGINS
        value: "https://studyai-fawn.vercel.app,http://localhost:3000"
      - key: PORT
        value: 4000
      - key: GEMINI_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: THROTTLE_TTL
        value: 60
      - key: THROTTLE_LIMIT
        value: 60
      # Attach a Render Redis instance and set REDIS_URL (preferred).
      # REDIS_ENABLED=false falls back to sync push + single-instance sockets.
      - key: REDIS_ENABLED
        value: "true"
      - key: REDIS_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
