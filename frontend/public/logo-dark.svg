<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <defs>
    <linearGradient id="logoGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="glowGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
  <!-- Icon: Neural graduation cap -->
  <g transform="translate(4, 4)">
    <!-- Cap brim -->
    <path d="M24 8 L48 20 L24 32 L0 20 Z" fill="url(#logoGradDark)" opacity="0.9"/>
    <!-- Cap top -->
    <rect x="18" y="4" width="12" height="8" rx="2" fill="url(#logoGradDark)"/>
    <!-- Tassel -->
    <line x1="24" y1="8" x2="38" y2="2" stroke="url(#glowGradDark)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="38" cy="2" r="2.5" fill="#A78BFA"/>
    <!-- Neural nodes -->
    <circle cx="10" cy="20" r="2" fill="white" opacity="0.9"/>
    <circle cx="24" cy="20" r="2.5" fill="white"/>
    <circle cx="38" cy="20" r="2" fill="white" opacity="0.9"/>
    <circle cx="17" cy="12" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="31" cy="12" r="1.5" fill="white" opacity="0.7"/>
    <!-- Neural connections -->
    <line x1="10" y1="20" x2="24" y2="20" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="24" y1="20" x2="38" y2="20" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="17" y1="12" x2="10" y2="20" stroke="white" stroke-width="0.8" opacity="0.4"/>
    <line x1="17" y1="12" x2="24" y2="20" stroke="white" stroke-width="0.8" opacity="0.4"/>
    <line x1="31" y1="12" x2="24" y2="20" stroke="white" stroke-width="0.8" opacity="0.4"/>
    <line x1="31" y1="12" x2="38" y2="20" stroke="white" stroke-width="0.8" opacity="0.4"/>
    <!-- AI sparkle -->
    <path d="M42 28 L44 24 L46 28 L50 30 L46 32 L44 36 L42 32 L38 30 Z" fill="url(#glowGradDark)" opacity="0.8"/>
  </g>
  <!-- Wordmark -->
  <text x="60" y="38" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#1F2937">Study</tspan><tspan fill="#7C3AED">AI</tspan>
  </text>
</svg>
